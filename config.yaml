ai_config:
  endpoint: "https://api.sentinel-ai.local/v1/evaluate"
  enabled: true
  api_key: "sk-dummy-key"

rules:
  - name: "AI Copilot Shell Evaluation"
    action: "ai_evaluate"
    target_executables:
      - "sh"
      - "bash"
      - "/bin/sh"
      - "/bin/bash"
    blocked_parents:
      - "*" # Send ALL shells to the AI for evaluation

  - name: "Block Netcat Executions Globally"
    action: "kill"
    target_executables:
      - "nc"
      - "netcat"
    blocked_parents:
      - "*"
